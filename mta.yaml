_schema-version: "3.1"
ID: dwcmission
version: 1.0.0
description: "SAP CAP application for SAP Datasphere integration - Tank Volume data entry"

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production

modules:
  # ─────────────────────────────────────────────────────────────
  # Module 1 : Service CAP Node.js
  # ─────────────────────────────────────────────────────────────
  - name: dwcmission-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    properties:
      EXIT: 1
    requires:
      - name: dwcmission-db
      - name: dwcmission-xsuaa
      - name: dwcmission-ups-dwc
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ─────────────────────────────────────────────────────────────
  # Module 2 : Déploiement base de données HDI
  # ─────────────────────────────────────────────────────────────
  - name: dwcmission-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    build-parameters:
      ignore:
        - node_modules
        - .build
    requires:
      - name: dwcmission-db
      - name: dwcmission-ups-dwc

  # ─────────────────────────────────────────────────────────────
  # Module 3 : Application web (page d'accueil)
  # ─────────────────────────────────────────────────────────────
  - name: dwcmission-app
    type: staticfile
    path: app
    parameters:
      memory: 64M
      disk-quota: 128M
    requires:
      - name: dwcmission-xsuaa

resources:
  # ─────────────────────────────────────────────────────────────
  # Ressource 1 : HDI Container (HANA Cloud)
  # ─────────────────────────────────────────────────────────────
  - name: dwcmission-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  # ─────────────────────────────────────────────────────────────
  # Ressource 2 : XSUAA (authentification et autorisation)
  # ─────────────────────────────────────────────────────────────
  - name: dwcmission-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: dwcmission-${org}-${space}
        tenant-mode: dedicated

  # ─────────────────────────────────────────────────────────────
  # Ressource 3 : User-Provided Service pour SAP Datasphere
  # Ce service fournit les credentials de connexion Datasphere
  # Il doit être créé manuellement avant le déploiement :
  #   cf cups ups_btp_dwc -p '{"host":"...","port":"443","user":"...","password":"..."}'
  # ─────────────────────────────────────────────────────────────
  - name: dwcmission-ups-dwc
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: ups_btp_dwc
